name: Ingest IRONMAN pro start lists

# Weekly: reads ironman.com's SERVER-RENDERED Pro Series starter pages
# (/proseries/races/{slug}/starters-men|women) with a plain fetch — the names are in the
# HTML, so no headless browser is needed. Writes src/data/proStartsIronman.json with a
# separate men/women gender per athlete. Polite delays between requests.

on:
  schedule:
    # Weekly, Sundays ~05:51 UTC.
    - cron: "51 5 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ingest-pro-starts-ironman
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Read IRONMAN Pro Series start lists
        run: node scripts/ingest-pro-starts-ironman.mjs

      - name: Commit starts if changed
        run: >-
          node scripts/ci-commit-data.mjs src/data/proStartsIronman.json
          "chore(data): refresh IRONMAN pro start lists"
