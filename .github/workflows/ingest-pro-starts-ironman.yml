name: Ingest IRONMAN pro start lists (DISABLED — ToS)

# DISABLED: ironman.com Terms of Use forbid automated access/scraping (robot/spider/
# crawler/extraction, personal non-commercial use only). We do NOT scrape ironman.com.
# The schedule is removed so this never runs automatically; the robot is also guarded
# (no-op unless TRIZONE_ALLOW_IRONMAN=1). Kept only in case of a future data licence.
# IRONMAN-race pro fields now come from third-party media + the official-list link.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ingest-pro-starts-ironman
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Read IRONMAN Pro Series start lists
        run: node scripts/ingest-pro-starts-ironman.mjs

      - name: Commit starts if changed
        run: >-
          node scripts/ci-commit-data.mjs src/data/proStartsIronman.json
          "chore(data): refresh IRONMAN pro start lists"
