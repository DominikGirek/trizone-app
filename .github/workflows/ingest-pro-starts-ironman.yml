name: Ingest IRONMAN pro start lists (headless)

# Weekly: drives a headless Chromium (Playwright) over ironman.com race pages, captures
# the page's own athlete XHR JSON, keeps only verified pros (PTO World Ranking + our
# roster), and writes src/data/proStartsIronman.json. ironman.com renders the pro field
# client-side with no public API, so a real browser is the only way to read it. Heavier
# than the pure-Node robots (installs Chromium); runs weekly + on demand.

on:
  schedule:
    # Weekly, Sundays ~05:51 UTC.
    - cron: "51 5 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ingest-pro-starts-ironman
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Playwright + Chromium
        run: |
          npm install playwright@latest
          npx playwright install --with-deps chromium

      - name: Render IRONMAN start lists
        run: node scripts/ingest-pro-starts-ironman.mjs

      - name: Commit starts if changed
        run: >-
          node scripts/ci-commit-data.mjs src/data/proStartsIronman.json
          "chore(data): refresh IRONMAN pro start lists"

      - name: Commit rendered-race cache if changed
        run: >-
          node scripts/ci-commit-data.mjs src/data/ironmanSeenRaces.json
          "chore(data): update IRONMAN rendered-race cache"
